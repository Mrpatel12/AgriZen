<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="glass-card p-5 mx-auto" style="max-width: 450px;">
            <h2 class="text-center mb-4 fw-bold">Sign In to <span class="text-gradient">AgriZen</span></h2>
            <div id="alertBox" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-secondary">Email Address</label>
                    <input type="email" id="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" id="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-success w-100 btn-lg mb-3">Sign In</button>
            </form>
            <p class="text-center text-secondary mb-0">Don't have an account? <a href="/register/" class="text-success text-decoration-none">Sign Up</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            try {
                const response = await fetch('/api/v1/auth/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = '/dashboard/';
                } else {
                    const errData = await response.json();
                    alertBox.textContent = errData.detail || 'Invalid email or password.';
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = 'Server connection failed.';
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
