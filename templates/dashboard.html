<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgriZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse px-0">
                <div class="position-sticky pt-3">
                    <div class="px-4 py-3 mb-4">
                        <span class="fs-4 fw-bold text-gradient"><i class="fa-solid fa-seedling me-2"></i>AgriZen</span>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" onclick="showSection('overview')">
                                <i class="fa-solid fa-chart-line me-2"></i> Overview
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('crops')">
                                <i class="fa-solid fa-wheat-awn me-2"></i> Crops
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('inventory')">
                                <i class="fa-solid fa-boxes-stacked me-2"></i> Inventory
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('finances')">
                                <i class="fa-solid fa-wallet me-2"></i> Finances
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('workers')">
                                <i class="fa-solid fa-users me-2"></i> Workers
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('weather')">
                                <i class="fa-solid fa-cloud-sun-rain me-2"></i> Weather & Market
                            </a>
                        </li>
                        <li class="nav-item mt-4 mx-3">
                            <button class="btn btn-outline-danger w-100" onclick="logout()">
                                <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom border-secondary">
                    <h1 class="h2 text-white">Dashboard Overview</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button onclick="downloadReport()" class="btn btn-sm btn-outline-light me-2"><i class="fa-solid fa-download me-1"></i> Export Report</button>
                    </div>
                </div>

                <!-- Alert Section -->
                <div id="alertsContainer" class="mb-4"></div>

                <!-- Overview Section -->
                <section id="overview-sec" class="dashboard-sec">
                    <!-- Metric Cards -->
                    <div class="row g-4 mb-4">
                        <div class="col-12 col-sm-6 col-xl-3">
                            <div class="glass-card p-4 d-flex align-items-center">
                                <div class="stats-icon bg-primary-soft me-3"><i class="fa-solid fa-seedling"></i></div>
                                <div>
                                    <h6 class="text-secondary mb-1">Active Crops</h6>
                                    <h3 class="mb-0 fw-bold" id="activeCropsCount">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-xl-3">
                            <div class="glass-card p-4 d-flex align-items-center">
                                <div class="stats-icon bg-danger-soft me-3"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                                <div>
                                    <h6 class="text-secondary mb-1">Total Expenses</h6>
                                    <h3 class="mb-0 fw-bold text-danger" id="totalExpensesAmount">₹0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-xl-3">
                            <div class="glass-card p-4 d-flex align-items-center">
                                <div class="stats-icon bg-info-soft me-3"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                                <div>
                                    <h6 class="text-secondary mb-1">Total Revenue</h6>
                                    <h3 class="mb-0 fw-bold text-info" id="totalRevenueAmount">₹0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-xl-3">
                            <div class="glass-card p-4 d-flex align-items-center">
                                <div class="stats-icon bg-warning-soft me-3"><i class="fa-solid fa-scale-balanced"></i></div>
                                <div>
                                    <h6 class="text-secondary mb-1">Net Profit</h6>
                                    <h3 class="mb-0 fw-bold text-success" id="netProfitAmount">₹0</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Charts & Recent Activities -->
                    <div class="row g-4">
                        <div class="col-12 col-lg-8">
                            <div class="glass-card p-4">
                                <h5 class="mb-4 text-white">Financial Breakdown</h5>
                                <div style="height: 300px;"><canvas id="financeChart"></canvas></div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-4">
                            <div class="glass-card p-4">
                                <h5 class="mb-4 text-white">Recent Activities</h5>
                                <div id="recentActivitiesList" class="list-group list-group-flush bg-transparent">
                                    <!-- Render list dynamically -->
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Dynamic Data Section Containers -->
                <section id="dynamic-sec" class="dashboard-sec d-none">
                    <div class="glass-card p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 id="secTitle" class="text-white">Management View</h4>
                            <button id="addNewBtn" class="btn btn-success" onclick="openAddModal()">Add New</button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover align-middle mb-0" id="dataListTable">
                                <thead><tr id="tableHeaderRow"></tr></thead>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <!-- Action Modal -->
    <div class="modal fade" id="actionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="actionModalTitle">Manage Record</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalFormBody"></div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveRecord()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSection = 'overview';
        let chartInstance = null;

        // Redirect if not logged in
        if (!localStorage.getItem('access_token')) {
            window.location.href = '/login/';
        }

        async function apiFetch(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...options.headers
            };

            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                logout();
            }
            return response;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login/';
        }

        function downloadReport() {
            const token = localStorage.getItem('access_token');
            window.location.href = `/api/v1/reports/export/?token=${token}`;
        }

        async function loadOverview() {
            try {
                const res = await apiFetch('/api/v1/dashboard/');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('activeCropsCount').textContent = data.active_crops || 0;
                    document.getElementById('totalExpensesAmount').textContent = `₹${data.total_expenses.toFixed(2)}`;
                    document.getElementById('totalRevenueAmount').textContent = `₹${data.total_revenues.toFixed(2)}`;
                    document.getElementById('netProfitAmount').textContent = `₹${data.total_profit.toFixed(2)}`;

                    // Activities
                    const actList = document.getElementById('recentActivitiesList');
                    actList.innerHTML = '';
                    if (data.recent_activities && data.recent_activities.length > 0) {
                        data.recent_activities.forEach(act => {
                            actList.innerHTML += `
                                <div class="list-group-item bg-transparent text-white border-secondary px-0">
                                    <div class="d-flex w-100 justify-content-between">
                                        <small class="text-success fw-bold">${act.type}</small>
                                        <small class="text-secondary">${act.time}</small>
                                    </div>
                                    <p class="mb-0 mt-1 small text-secondary">${act.message}</p>
                                </div>
                            `;
                        });
                    } else {
                        actList.innerHTML = '<p class="text-secondary text-center">No recent alerts or tasks.</p>';
                    }

                    // Chart
                    initChart(data.total_expenses, data.total_revenues, data.total_profit);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function initChart(expenses, revenue, profit) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            if (chartInstance) {
                chartInstance.destroy();
            }
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Expenses', 'Revenue', 'Profit'],
                    datasets: [{
                        label: 'Financial Performance (₹)',
                        data: [expenses, revenue, profit],
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.7)',
                            'rgba(14, 165, 233, 0.7)',
                            'rgba(34, 197, 94, 0.7)'
                        ],
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');

            if (section === 'overview') {
                document.getElementById('overview-sec').classList.remove('d-none');
                document.getElementById('dynamic-sec').classList.add('d-none');
                loadOverview();
            } else {
                document.getElementById('overview-sec').classList.add('d-none');
                document.getElementById('dynamic-sec').classList.remove('d-none');
                renderDynamicSection(section);
            }
        }

        async function openAddModal() {
            const formBody = document.getElementById('modalFormBody');
            formBody.innerHTML = '<div class="text-center"><div class="spinner-border text-success" role="status"></div></div>';
            
            // Show modal
            const actionModal = new bootstrap.Modal(document.getElementById('actionModal'));
            actionModal.show();

            try {
                // Fetch farms to populate dropdowns
                const farmsRes = await apiFetch('/api/v1/farms/');
                const farms = await farmsRes.json();
                
                if (farms.length === 0) {
                    formBody.innerHTML = `
                        <div class="alert alert-warning mb-3">
                            <strong>No Farms Found!</strong> Please create a Farm first to add records.
                        </div>
                        <form id="createFarmForm" class="p-2">
                            <div class="mb-3">
                                <label class="form-label text-light">Farm Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="farm_name_input" placeholder="Green Valley Farm" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Location</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="farm_location_input" placeholder="California" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Size (Acres)</label>
                                <input type="number" step="0.1" class="form-control bg-dark text-white border-secondary" id="farm_size_input" placeholder="150" required>
                            </div>
                            <button type="button" class="btn btn-success w-100 mt-2" onclick="createInitialFarm()">Create Farm</button>
                        </form>
                    `;
                    return;
                }

                let farmOptions = farms.map(f => `<option value="${f.id}">${f.name}</option>`).join('');

                if (currentSection === 'workers') {
                    formBody.innerHTML = `
                        <form id="recordForm">
                            <div class="mb-3">
                                <label class="form-label">Farm</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_farm" required>${farmOptions}</select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Worker Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_name" placeholder="John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_role" placeholder="Harvester" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Wage Rate (per day)</label>
                                <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_wage_rate" placeholder="50.00" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contact Info</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_contact_info" placeholder="+123456789">
                            </div>
                        </form>
                    `;
                } else if (currentSection === 'crops') {
                    formBody.innerHTML = `
                        <form id="recordForm">
                            <div class="mb-3">
                                <label class="form-label">Farm</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_farm" required>${farmOptions}</select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Crop Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_name" placeholder="Wheat" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Variety</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_variety" placeholder="Durum">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_status" required>
                                    <option value="PLANTED">Planted</option>
                                    <option value="GROWING">Growing</option>
                                    <option value="HARVESTED">Harvested</option>
                                    <option value="CANCELLED">Cancelled</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Planting Date</label>
                                <input type="date" class="form-control bg-dark text-white border-secondary" id="form_planting_date" value="${new Date().toISOString().split('T')[0]}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Harvest Date</label>
                                <input type="date" class="form-control bg-dark text-white border-secondary" id="form_harvest_date">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Yield Quantity</label>
                                <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_yield_quantity" value="0.0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Yield Unit</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_yield_unit" value="kg">
                            </div>
                        </form>
                    `;
                } else if (currentSection === 'inventory') {
                    formBody.innerHTML = `
                        <form id="recordForm">
                            <div class="mb-3">
                                <label class="form-label">Farm</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_farm" required>${farmOptions}</select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Item Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_item_name" placeholder="Super Phosphate" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_category" required>
                                    <option value="SEEDS">Seeds</option>
                                    <option value="FERTILIZERS">Fertilizers</option>
                                    <option value="PESTICIDES">Pesticides</option>
                                    <option value="EQUIPMENT">Equipment</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Quantity</label>
                                <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_quantity" placeholder="100.0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Unit</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="form_unit" value="kg" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Low Stock Threshold</label>
                                <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_low_stock_threshold" value="10.0" required>
                            </div>
                        </form>
                    `;
                } else if (currentSection === 'finances') {
                    const cropsRes = await apiFetch('/api/v1/crops/');
                    const crops = await cropsRes.json();
                    let cropOptions = crops.map(c => `<option value="${c.id}">${c.name} (${c.variety})</option>`).join('');
                    
                    formBody.innerHTML = `
                        <form id="recordForm">
                            <div class="mb-3">
                                <label class="form-label">Transaction Type</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_transaction_type" onchange="toggleFinanceFields()" required>
                                    <option value="EXPENSE">Expense</option>
                                    <option value="REVENUE">Revenue</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Farm</label>
                                <select class="form-select bg-dark text-white border-secondary" id="form_farm" required>${farmOptions}</select>
                            </div>
                            
                            <!-- Expense Specific Fields -->
                            <div id="expenseFields">
                                <div class="mb-3">
                                    <label class="form-label">Expense Category</label>
                                    <select class="form-select bg-dark text-white border-secondary" id="form_expense_category">
                                        <option value="LABOR">Labor</option>
                                        <option value="SEED">Seed</option>
                                        <option value="FERTILIZER">Fertilizer</option>
                                        <option value="EQUIPMENT">Equipment</option>
                                        <option value="MISC">Miscellaneous</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Amount (₹)</label>
                                    <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_expense_amount" placeholder="0.00">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Description</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="form_expense_desc" placeholder="Purchased organic fertilizer">
                                </div>
                            </div>

                            <!-- Revenue Specific Fields -->
                            <div id="revenueFields" class="d-none">
                                <div class="mb-3">
                                    <label class="form-label">Associated Crop (Optional)</label>
                                    <select class="form-select bg-dark text-white border-secondary" id="form_revenue_crop">
                                        <option value="">-- None --</option>
                                        ${cropOptions}
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Buyer Name</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="form_buyer_name" placeholder="Green Grocers Inc.">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Quantity Sold</label>
                                    <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_quantity_sold" placeholder="50.0">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Price Per Unit (₹)</label>
                                    <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="form_price_per_unit" placeholder="2.50">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control bg-dark text-white border-secondary" id="form_date" value="${new Date().toISOString().split('T')[0]}" required>
                            </div>
                        </form>
                    `;
                }
            } catch (err) {
                console.error(err);
                formBody.innerHTML = `<div class="alert alert-danger mb-0">Error loading form data. Please try again.</div>`;
            }
        }

        async function createInitialFarm() {
            const name = document.getElementById('farm_name_input').value;
            const location = document.getElementById('farm_location_input').value;
            const size = document.getElementById('farm_size_input').value;

            if (!name || !location || !size) {
                alert('Please fill out all fields.');
                return;
            }

            try {
                const res = await apiFetch('/api/v1/farms/', {
                    method: 'POST',
                    body: JSON.stringify({ name, location, size })
                });

                if (res.ok) {
                    openAddModal();
                } else {
                    const err = await res.json();
                    alert('Failed to create farm: ' + JSON.stringify(err));
                }
            } catch (err) {
                console.error(err);
                alert('Error creating farm.');
            }
        }

        function toggleFinanceFields() {
            const type = document.getElementById('form_transaction_type').value;
            const expFields = document.getElementById('expenseFields');
            const revFields = document.getElementById('revenueFields');
            if (type === 'EXPENSE') {
                expFields.classList.remove('d-none');
                revFields.classList.add('d-none');
            } else {
                expFields.classList.add('d-none');
                revFields.classList.remove('d-none');
            }
        }

        async function saveRecord() {
            const form = document.getElementById('recordForm');
            if (form && !form.checkValidity()) {
                form.reportValidity();
                return;
            }

            let endpoint = '';
            let payload = {};

            if (currentSection === 'workers') {
                endpoint = '/api/v1/workers/';
                payload = {
                    farm: document.getElementById('form_farm').value,
                    name: document.getElementById('form_name').value,
                    role: document.getElementById('form_role').value,
                    wage_rate: document.getElementById('form_wage_rate').value,
                    contact_info: document.getElementById('form_contact_info').value
                };
            } else if (currentSection === 'crops') {
                endpoint = '/api/v1/crops/';
                payload = {
                    farm: document.getElementById('form_farm').value,
                    name: document.getElementById('form_name').value,
                    variety: document.getElementById('form_variety').value,
                    status: document.getElementById('form_status').value,
                    planting_date: document.getElementById('form_planting_date').value,
                    harvest_date: document.getElementById('form_harvest_date').value || null,
                    yield_quantity: document.getElementById('form_yield_quantity').value || 0,
                    yield_unit: document.getElementById('form_yield_unit').value
                };
            } else if (currentSection === 'inventory') {
                endpoint = '/api/v1/inventory/';
                payload = {
                    farm: document.getElementById('form_farm').value,
                    item_name: document.getElementById('form_item_name').value,
                    category: document.getElementById('form_category').value,
                    quantity: document.getElementById('form_quantity').value,
                    unit: document.getElementById('form_unit').value,
                    low_stock_threshold: document.getElementById('form_low_stock_threshold').value
                };
            } else if (currentSection === 'finances') {
                const type = document.getElementById('form_transaction_type').value;
                if (type === 'EXPENSE') {
                    endpoint = '/api/v1/expenses/';
                    payload = {
                        farm: document.getElementById('form_farm').value,
                        category: document.getElementById('form_expense_category').value,
                        amount: document.getElementById('form_expense_amount').value,
                        date: document.getElementById('form_date').value,
                        description: document.getElementById('form_expense_desc').value
                    };
                } else {
                    endpoint = '/api/v1/revenues/';
                    payload = {
                        farm: document.getElementById('form_farm').value,
                        crop: document.getElementById('form_revenue_crop').value || null,
                        buyer_name: document.getElementById('form_buyer_name').value,
                        quantity_sold: document.getElementById('form_quantity_sold').value,
                        price_per_unit: document.getElementById('form_price_per_unit').value,
                        date: document.getElementById('form_date').value
                    };
                }
            }

            try {
                const res = await apiFetch(endpoint, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    // Hide modal
                    const modalEl = document.getElementById('actionModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                    
                    // Reload section data
                    renderDynamicSection(currentSection);
                } else {
                    const errData = await res.json();
                    alert('Failed to save record: ' + JSON.stringify(errData));
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred while saving the record.');
            }
        }

        async function renderDynamicSection(section) {
            const titleMap = {
                crops: 'Crops Management',
                inventory: 'Inventory Tracking',
                finances: 'Financial Revenues & Expenses',
                workers: 'Farm Workers & Attendance',
                weather: 'Live Weather & Market Intelligence'
            };
            
            // Show/Hide Add New button based on section
            const addNewBtn = document.getElementById('addNewBtn');
            if (section === 'weather') {
                addNewBtn.classList.add('d-none');
            } else {
                addNewBtn.classList.remove('d-none');
            }

            document.getElementById('secTitle').textContent = titleMap[section];

            const headerRow = document.getElementById('tableHeaderRow');
            const tbody = document.getElementById('tableBody');
            headerRow.innerHTML = '';
            tbody.innerHTML = '';

            if (section === 'crops') {
                headerRow.innerHTML = '<th>Crop Name</th><th>Variety</th><th>Status</th><th>Planting Date</th><th>Yield</th>';
                const res = await apiFetch('/api/v1/crops/');
                const list = await res.json();
                list.forEach(item => {
                    tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.variety}</td><td><span class="badge bg-success">${item.status}</span></td><td>${item.planting_date}</td><td>${item.yield_quantity} ${item.yield_unit}</td></tr>`;
                });
            } else if (section === 'inventory') {
                headerRow.innerHTML = '<th>Item Name</th><th>Category</th><th>Quantity</th><th>Unit</th><th>Alert Level</th>';
                const res = await apiFetch('/api/v1/inventory/');
                const list = await res.json();
                list.forEach(item => {
                    tbody.innerHTML += `<tr><td>${item.item_name}</td><td>${item.category}</td><td>${item.quantity}</td><td>${item.unit}</td><td>${item.low_stock_threshold}</td></tr>`;
                });
            } else if (section === 'finances') {
                headerRow.innerHTML = '<th>Type</th><th>Category</th><th>Amount</th><th>Date</th>';
                const resExp = await apiFetch('/api/v1/expenses/');
                const listExp = await resExp.json();
                listExp.forEach(item => {
                    tbody.innerHTML += `<tr><td class="text-danger">Expense</td><td>${item.category}</td><td class="text-danger">-₹${item.amount}</td><td>${item.date}</td></tr>`;
                });
                const resRev = await apiFetch('/api/v1/revenues/');
                const listRev = await resRev.json();
                listRev.forEach(item => {
                    tbody.innerHTML += `<tr><td class="text-success">Revenue</td><td>Sale to ${item.buyer_name || 'Buyer'}</td><td class="text-success">+₹${item.total_amount}</td><td>${item.date}</td></tr>`;
                });
            } else if (section === 'workers') {
                headerRow.innerHTML = '<th>Worker Name</th><th>Role</th><th>Wage Rate</th><th>Contact Info</th>';
                const res = await apiFetch('/api/v1/workers/');
                const list = await res.json();
                list.forEach(item => {
                    tbody.innerHTML += `<tr><td><strong>${item.name}</strong></td><td>${item.role}</td><td>₹${item.wage_rate}/day</td><td>${item.contact_info || 'N/A'}</td></tr>`;
                });
            } else if (section === 'weather') {
                headerRow.innerHTML = '<th>Item / Market Info</th><th>Metric / Current Price</th><th>Trend / Forecast Info</th>';
                const wRes = await apiFetch('/api/v1/weather/');
                const wData = await wRes.json();
                tbody.innerHTML += `<tr><td><strong>Live Forecast (${wData.location})</strong></td><td>${wData.temperature}°C, ${wData.condition}</td><td>${wData.alert}</td></tr>`;
                const mRes = await apiFetch('/api/v1/market/');
                const mData = await mRes.json();
                mData.forEach(price => {
                    tbody.innerHTML += `<tr><td>Crop Market Pricing: ${price.crop}</td><td>₹${price.price} per ton</td><td>Trend: <strong class="text-success">${price.trend.toUpperCase()}</strong></td></tr>`;
                });
            }
        }

        // Run on load
        loadOverview();
    </script>
</body>
</html>
